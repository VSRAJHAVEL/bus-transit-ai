name: Sync to Hugging Face hub
on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push https://VSRAJHAVEL:$HF_TOKEN@huggingface.co/spaces/VSRAJHAVEL/BUS-TRANSIT-AI master:main --force
